<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" href="data:,">
<title>智慧地板 · AI虚拟销售顾问（方案B · 左侧产品列表）</title>
<link rel="stylesheet" href="shared.css?v=3">
<style>
/* ===== 方案B：产品列表在最左侧 ===== */
.body-row { flex: 1; display: flex; min-height: 0; }

.list-panel {
  width: 296px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  margin: 16px 0 16px 16px;
  background: var(--panel);
  border-radius: 20px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  min-height: 0;
}
.list-head {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.list-head h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.list-head span { font-size: 11.5px; color: var(--muted); }
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.filters .filter-btn { padding: 5px 13px; font-size: 12.5px; }

#productStrip {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.p-card { display: flex; gap: 11px; padding: 9px; align-items: center; flex-shrink: 0; }
.p-card:hover { transform: none; }
.p-thumb { width: 62px; height: 62px; border-radius: 10px; flex-shrink: 0; overflow: hidden; }
.p-thumb .hot-tag { top: 3px; left: 3px; font-size: 9px; padding: 2px 6px; }
.p-info { flex: 1; min-width: 0; }

.hero { flex: 1; margin: 16px 0; min-width: 0; margin-left: 16px; }

.chat-panel { width: 384px; flex-shrink: 0; margin: 16px; }

@media (max-width: 1280px) {
  .list-panel { width: 260px; }
  .chat-panel { width: 330px; }
  .detail-card { width: 280px; }
}

/* 窄屏：效果图在上，产品横滑，聊天在下 */
@media (max-width: 900px) {
  html, body { overflow: auto; }
  .body-row { flex-direction: column; overflow: visible; }
  .hero { order: 1; flex: none; height: 44vh; min-height: 300px; margin: 12px 12px 0; }
  .list-panel { order: 2; width: auto; margin: 12px 12px 0; }
  #productStrip { flex-direction: row; overflow-x: auto; overflow-y: hidden; }
  .p-card { width: 230px; }
  .detail-card { width: min(300px, calc(100% - 24px)); top: 12px; left: 12px; }
  .chat-panel { order: 3; width: auto; flex: none; height: 58vh; min-height: 420px; margin: 12px 12px 16px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">木</div>
      <div class="brand-name">智慧地板<small>SMART FLOORING</small></div>
    </div>
    <div class="topbar-status"><span class="dot"></span>AI 顾问在线服务中</div>
  </div>

  <div class="body-row">
    <div class="list-panel">
      <div class="list-head">
        <h3>产品系列</h3>
        <span id="productCount"></span>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="实木">实木</button>
        <button class="filter-btn" data-filter="多层实木">多层实木</button>
        <button class="filter-btn" data-filter="强化">强化</button>
        <button class="filter-btn" data-filter="SPC">SPC石晶</button>
      </div>
      <div id="productStrip"></div>
    </div>

    <div class="hero">
      <canvas id="roomCanvas"></canvas>
      <div class="hero-hint" id="heroHint">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        从左侧挑选地板，或直接询问右侧 AI 顾问
      </div>
      <div class="detail-card" id="detailCard"></div>
      <div class="room-tabs">
        <button class="room-tab active" data-room="living">客厅</button>
        <button class="room-tab" data-room="bedroom">卧室</button>
        <button class="room-tab" data-room="study">书房</button>
        <button class="room-tab" data-room="hallway">走廊</button>
      </div>
      <div class="hero-label" id="heroLabel">客厅 · 实时铺装预览</div>
    </div>

    <div class="chat-panel">
      <div class="chat-head">
        <div class="ai-orb">木</div>
        <div class="who">
          <div class="name">小木</div>
          <div class="role">AI 智能销售顾问 · 在线</div>
        </div>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音播报开关">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
        </button>
        <div class="badge">AI 导购</div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="quick-replies" id="quickReplies"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="想找什么样的地板？问我就好～" />
        <button id="sendBtn" onclick="sendMessage()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="app.js?v=10"></script>
</body>
</html>
